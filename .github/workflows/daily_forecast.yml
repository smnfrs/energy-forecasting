name: Daily Forecast

on:
  schedule:
    # 08:00 UTC = 09:00 CET / 10:00 CEST — after D+1 SMARD generation forecasts publish
    - cron: "0 8 * * *"
  workflow_dispatch:

env:
  REPO: smnfrs/energy-forecasting

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: energy-forecasting
          auto-activate-base: false

      - name: Install package
        run: conda run -n energy-forecasting pip install -e .

      - name: Download model artifacts
        run: |
          gh release download --repo $REPO --pattern 'models.tar.gz' --dir /tmp/ --clobber
          tar -xzf /tmp/models.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore raw-data cache
        id: cache-raw
        uses: actions/cache@v4
        with:
          path: data/raw/
          key: raw-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            raw-data-${{ runner.os }}-

      - name: Bootstrap raw data from Release (cache miss only)
        if: steps.cache-raw.outputs.cache-hit != 'true'
        run: |
          gh release download --repo $REPO --pattern 'data-bootstrap.tar.gz' --dir /tmp/ --clobber || true
          if [ -f /tmp/data-bootstrap.tar.gz ]; then
            tar -xzf /tmp/data-bootstrap.tar.gz
            echo "Bootstrapped raw data from Release"
          else
            echo "No bootstrap available; update all will run a full download"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update data (SMARD + weather + commodities)
        run: conda run -n energy-forecasting energy-forecasting update all

      - name: Merge and process
        run: conda run -n energy-forecasting energy-forecasting process

      - name: Upload processed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_id }}
          path: data/processed/
          retention-days: 1

      - name: Upload weather forecast artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-data-${{ github.run_id }}
          path: data/raw/weather/
          retention-days: 1

  inference:
    needs: collect-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: energy-forecasting
          auto-activate-base: false

      - name: Install package
        run: conda run -n energy-forecasting pip install -e .

      - name: Download model artifacts
        run: |
          gh release download --repo $REPO --pattern 'models.tar.gz' --dir /tmp/ --clobber
          tar -xzf /tmp/models.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ github.run_id }}
          path: data/processed/

      - name: Download weather forecasts
        uses: actions/download-artifact@v4
        with:
          name: weather-data-${{ github.run_id }}
          path: data/raw/weather/

      - name: Restore deploy state (rolling history + gen/load forecasts)
        uses: actions/cache/restore@v4
        with:
          path: |
            deploy/data/
            data/processed/historical_forecasts/
          key: deploy-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            deploy-state-${{ runner.os }}-

      - name: Run inference (skip data update)
        run: conda run -n energy-forecasting energy-forecasting deploy forecast --skip-update

      - name: Save deploy state (rolling history + gen/load forecasts)
        uses: actions/cache/save@v4
        with:
          path: |
            deploy/data/
            data/processed/historical_forecasts/
          key: deploy-state-${{ runner.os }}-${{ github.run_id }}

      - name: Upload forecast outputs
        uses: actions/upload-artifact@v4
        with:
          name: forecast-outputs-${{ github.run_id }}
          path: deploy/data/
          retention-days: 7

  deploy:
    needs: inference
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download forecast outputs
        uses: actions/download-artifact@v4
        with:
          name: forecast-outputs-${{ github.run_id }}
          path: deploy/data/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
