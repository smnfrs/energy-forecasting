name: Retrain

on:
  schedule:
    # 06:00 UTC on 1st and 15th of each month
    - cron: "0 6 1,15 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force retrain even if no degradation detected"
        type: boolean
        default: false
      price_only:
        description: "Retrain only price models (always true in CI; gen/load is manual)"
        type: boolean
        default: true

env:
  REPO: smnfrs/energy-forecasting

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Price-only retrain; gen/load is manual (8-12h)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: energy-forecasting
          auto-activate-base: false

      - name: Install package
        run: conda run -n energy-forecasting pip install -e .

      - name: Download model artifacts
        run: |
          gh release download latest --repo $REPO --pattern 'models.tar.gz' --dir /tmp/ --clobber
          tar -xzf /tmp/models.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore raw-data cache
        id: cache-raw
        uses: actions/cache@v4
        with:
          path: data/raw/
          key: raw-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            raw-data-${{ runner.os }}-

      - name: Bootstrap raw data from Release (cache miss only)
        if: steps.cache-raw.outputs.cache-hit != 'true'
        run: |
          gh release download latest --repo $REPO --pattern 'data-bootstrap.tar.gz' --dir /tmp/ --clobber || true
          if [ -f /tmp/data-bootstrap.tar.gz ]; then
            mkdir -p data/
            tar -xzf /tmp/data-bootstrap.tar.gz -C data/
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update data
        run: conda run -n energy-forecasting energy-forecasting update all

      - name: Run price retrain
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          conda run -n energy-forecasting \
            energy-forecasting deploy retrain --price-only $FORCE_FLAG

      - name: Package and upload updated models to Release
        if: success()
        run: |
          tar -czf /tmp/models.tar.gz \
            models/price/ \
            models/gen_load/ \
            models/ensemble_config.json \
            models/gen_load_config.json
          gh release upload latest /tmp/models.tar.gz --repo $REPO --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated ensemble config
        if: success()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add models/ensemble_config.json
          git diff --cached --quiet || \
            git commit -m "ci: update ensemble_config after retrain [skip ci]"
          git push
