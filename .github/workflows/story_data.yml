name: Story Data (Weekly)

# Regenerates the slow-moving storytelling data for both the Stage 9 history
# site (deploy/story/) and the Stage 10 forecast story (deploy/story/forecast/),
# then commits the refreshed JSON (and re-inlined HTML) straight to master.
# deploy/story/ is git-tracked, so the next Pages deploy (daily_forecast.yml's
# checkout) picks up the update automatically — no separate restore step needed.

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  REPO: smnfrs/energy-forecasting

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: energy-forecasting
          auto-activate-base: false

      - name: Install package
        run: conda run -n energy-forecasting pip install -e .

      - name: Restore raw-data cache
        id: cache-raw
        uses: actions/cache@v4
        with:
          path: data/raw/
          key: raw-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            raw-data-${{ runner.os }}-

      - name: Bootstrap raw data from Release (cache miss only)
        if: steps.cache-raw.outputs.cache-hit != 'true'
        run: |
          gh release download --repo $REPO --pattern 'data-bootstrap.tar.gz' --dir /tmp/ --clobber || true
          if [ -f /tmp/data-bootstrap.tar.gz ]; then
            tar -xzf /tmp/data-bootstrap.tar.gz
            echo "Bootstrapped raw data from Release"
          else
            echo "No bootstrap available; update all will run a full download"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update data (SMARD + weather + commodities)
        run: conda run -n energy-forecasting energy-forecasting update all

      - name: Merge and process
        run: conda run -n energy-forecasting energy-forecasting process

      - name: Build Stage 9 history story data
        run: conda run -n energy-forecasting python scripts/build_story_data.py

      - name: Build Stage 10 forecast story data + weekly narrative
        run: |
          conda run -n energy-forecasting python scripts/build_forecast_story_data.py
          conda run -n energy-forecasting energy-forecasting deploy narrative-yearly
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit refreshed story data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/story/
          if git diff --cached --quiet; then
            echo "No story data changes to commit"
          else
            git commit -m "chore(story): weekly story data refresh"
            git push origin HEAD:master
          fi
